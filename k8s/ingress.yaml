apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edc-validation-dashboard
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  rules:
    - host: edc-validation-dashboard.example.educloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: edc-validation-dashboard
                port:
                  name: http
